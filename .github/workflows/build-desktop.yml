name: Build Desktop App

on:
  push:
    branches:
      - main
      - release/**
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x64
            os: ubuntu-latest
            artifact_name: app-foundation
            artifact_path: src-tauri/target/release/app-foundation
          - name: macos-x64
            os: macos-latest
            artifact_name: app-foundation
            artifact_path: src-tauri/target/release/app-foundation
          - name: windows-x64
            os: windows-latest
            artifact_name: app-foundation.exe
            artifact_path: src-tauri/target/release/app-foundation.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PY=python3
          elif command -v python >/dev/null 2>&1; then
            PY=python
          else
            echo "Python executable not found on runner" >&2
            exit 1
          fi
          version="$("$PY" -c 'import pathlib,re,sys; text=pathlib.Path("src-tauri/Cargo.toml").read_text(encoding="utf-8"); section=re.search(r"(?ms)^\[package\]\s*(.*?)(?=^\[|\Z)", text); m=re.search(r"(?m)^\s*version\s*=\s*\"([^\"]+)\"\s*$", section.group(1) if section else ""); print(m.group(1) if m else (sys.stderr.write("Could not find [package].version in src-tauri/Cargo.toml\\n") or sys.exit(1)))')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "App version: ${version}"

      - name: Validate release tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          expected="v${{ steps.app_version.outputs.version }}"
          actual="${GITHUB_REF_NAME}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "Tag/version mismatch: tag=${actual}, expected=${expected}" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify version consistency
        run: node scripts/version-sync.mjs --check

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare bundled llama.cpp runtimes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import shutil
          import stat
          import tarfile
          import urllib.request
          import zipfile

          def request_json(url: str) -> dict:
            req = urllib.request.Request(url)
            req.add_header("Accept", "application/vnd.github+json")
            req.add_header("User-Agent", "arxell-lite-ci")
            token = os.environ.get("GITHUB_TOKEN", "").strip()
            if token:
              req.add_header("Authorization", f"Bearer {token}")
            with urllib.request.urlopen(req, timeout=60) as resp:
              return json.loads(resp.read().decode("utf-8"))

          def safe_extract_tar(archive_path: pathlib.Path, dest: pathlib.Path) -> None:
            with tarfile.open(archive_path, "r:*") as tf:
              for member in tf.getmembers():
                target = (dest / member.name).resolve()
                if not str(target).startswith(str(dest.resolve())):
                  raise RuntimeError(f"unsafe tar member path: {member.name}")
              tf.extractall(dest)

          def safe_extract_zip(archive_path: pathlib.Path, dest: pathlib.Path) -> None:
            with zipfile.ZipFile(archive_path) as zf:
              for member in zf.infolist():
                target = (dest / member.filename).resolve()
                if not str(target).startswith(str(dest.resolve())):
                  raise RuntimeError(f"unsafe zip member path: {member.filename}")
              zf.extractall(dest)

          def find_binary(dest: pathlib.Path, binary_name: str) -> pathlib.Path | None:
            for path in dest.rglob(binary_name):
              if path.is_file():
                return path
            return None

          def select_asset(assets: list[dict], required: list[str], forbidden: list[str]) -> dict | None:
            candidates = []
            for asset in assets:
              name = str(asset.get("name", "")).lower()
              if not name.startswith("llama-"):
                continue
              if not (name.endswith(".tar.gz") or name.endswith(".zip")):
                continue
              if asset.get("size", 0) <= 0:
                continue
              if any(word in name for word in forbidden):
                continue
              if not all(word in name for word in required):
                continue
              candidates.append(asset)
            if not candidates:
              return None
            candidates.sort(key=lambda item: len(item["name"]), reverse=True)
            return candidates[0]

          runner_os = os.environ.get("RUNNER_OS", "")
          os_key = {
            "Linux": "linux",
            "Windows": "windows",
            "macOS": "macos",
          }.get(runner_os, "")
          if not os_key:
            raise RuntimeError(f"unsupported RUNNER_OS={runner_os}")

          release = request_json("https://api.github.com/repos/ggml-org/llama.cpp/releases/latest")
          assets = release.get("assets", [])
          tag = release.get("tag_name", "unknown")

          if os_key == "linux":
            targets = [
              ("llama.cpp-cpu", ["ubuntu", "x64"], ["vulkan", "cuda", "rocm", "hip", "aclgraph", "s390x", "cudart"]),
              ("llama.cpp-vulkan", ["ubuntu", "vulkan", "x64"], ["cuda", "rocm", "hip", "aclgraph", "s390x", "cudart"]),
              ("llama.cpp-cuda", ["ubuntu", "cuda", "x64"], ["vulkan", "rocm", "hip", "aclgraph", "s390x", "cudart"]),
              ("llama.cpp-rocm", ["ubuntu", "rocm", "x64"], ["vulkan", "cuda", "aclgraph", "s390x", "cudart"]),
            ]
            required_engines = ["llama.cpp-cpu", "llama.cpp-vulkan"]
          elif os_key == "windows":
            targets = [
              ("llama.cpp-cpu", ["win", "cpu", "x64"], ["vulkan", "cuda", "hip", "cudart"]),
              ("llama.cpp-vulkan", ["win", "vulkan", "x64"], ["cuda", "hip", "cudart"]),
              ("llama.cpp-cuda", ["win", "cuda", "x64"], ["vulkan", "hip", "cudart"]),
              ("llama.cpp-rocm", ["win", "hip", "radeon", "x64"], ["vulkan", "cuda", "cudart"]),
            ]
            required_engines = ["llama.cpp-cpu", "llama.cpp-vulkan"]
          else:
            targets = [
              ("llama.cpp-metal", ["macos", "x64"], ["xcframework"]),
              ("llama.cpp-cpu", ["macos", "x64"], ["xcframework"]),
            ]
            required_engines = ["llama.cpp-cpu", "llama.cpp-metal"]

          repo_root = pathlib.Path(".").resolve()
          resources_root = repo_root / "src-tauri" / "resources" / "llama-runtime"
          temp_root = repo_root / ".tmp-llama-runtime"
          shutil.rmtree(temp_root, ignore_errors=True)
          temp_root.mkdir(parents=True, exist_ok=True)
          resources_root.mkdir(parents=True, exist_ok=True)

          selected = {}
          prepared = {}
          downloaded = {}
          binary_name = "llama-server.exe" if os_key == "windows" else "llama-server"

          for engine_id, required, forbidden in targets:
            asset = select_asset(assets, required, forbidden)
            if not asset:
              print(f"[llama-runtime] skip {engine_id}: no compatible release asset")
              continue
            name = asset["name"]
            url = asset["browser_download_url"]
            selected[engine_id] = {"name": name, "url": url}
            archive_path = downloaded.get(url)
            if not archive_path:
              archive_path = temp_root / name
              print(f"[llama-runtime] download {engine_id}: {name}")
              req = urllib.request.Request(url, headers={"User-Agent": "arxell-lite-ci"})
              with urllib.request.urlopen(req, timeout=120) as resp, open(archive_path, "wb") as out:
                shutil.copyfileobj(resp, out)
              downloaded[url] = archive_path

            extract_dir = temp_root / f"extract-{engine_id}"
            shutil.rmtree(extract_dir, ignore_errors=True)
            extract_dir.mkdir(parents=True, exist_ok=True)
            if str(archive_path).lower().endswith(".zip"):
              safe_extract_zip(archive_path, extract_dir)
            else:
              safe_extract_tar(archive_path, extract_dir)

            binary_src = find_binary(extract_dir, binary_name)
            if not binary_src:
              print(f"[llama-runtime] skip {engine_id}: {binary_name} not found after extraction")
              continue

            engine_dir = resources_root / engine_id
            shutil.rmtree(engine_dir, ignore_errors=True)
            engine_dir.mkdir(parents=True, exist_ok=True)
            binary_dest = engine_dir / binary_name
            shutil.copy2(binary_src, binary_dest)
            if os_key != "windows":
              binary_dest.chmod(binary_dest.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
            print(f"[llama-runtime] prepared {engine_id}: {binary_dest}")
            prepared[engine_id] = {
              "name": name,
              "url": url,
              "binaryPath": str(binary_dest.relative_to(repo_root)),
            }

          missing_required = [engine_id for engine_id in required_engines if engine_id not in prepared]
          if missing_required:
            raise RuntimeError(f"Missing required bundled llama runtime engines for {runner_os}: {missing_required}")

          manifest = {
            "releaseTag": tag,
            "runnerOs": runner_os,
            "engines": prepared,
          }
          (resources_root / "manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print("[llama-runtime] manifest written")
          PY

      - name: Prepare bundled whisper runtimes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import shutil
          import stat
          import tarfile
          import urllib.request
          import zipfile

          def request_json(url: str) -> dict:
            req = urllib.request.Request(url)
            req.add_header("Accept", "application/vnd.github+json")
            req.add_header("User-Agent", "arxell-lite-ci")
            token = os.environ.get("GITHUB_TOKEN", "").strip()
            if token:
              req.add_header("Authorization", f"Bearer {token}")
            with urllib.request.urlopen(req, timeout=60) as resp:
              return json.loads(resp.read().decode("utf-8"))

          def safe_extract_tar(archive_path: pathlib.Path, dest: pathlib.Path) -> None:
            with tarfile.open(archive_path, "r:*") as tf:
              for member in tf.getmembers():
                target = (dest / member.name).resolve()
                if not str(target).startswith(str(dest.resolve())):
                  raise RuntimeError(f"unsafe tar member path: {member.name}")
              tf.extractall(dest)

          def download_file(url: str, dest: pathlib.Path) -> bool:
            try:
              req = urllib.request.Request(url, headers={"User-Agent": "arxell-lite-ci"})
              with urllib.request.urlopen(req, timeout=120) as resp, open(dest, "wb") as out:
                shutil.copyfileobj(resp, out)
              return True
            except Exception as e:
              print(f"Download failed: {e}")
              return False

          runner_os = os.environ.get("RUNNER_OS", "")
          os_key = {
            "Linux": "linux",
            "Windows": "windows",
            "macOS": "macos",
          }.get(runner_os, "")
          if not os_key:
            raise RuntimeError(f"unsupported RUNNER_OS={runner_os}")

          repo_root = pathlib.Path(".").resolve()
          resources_root = repo_root / "src-tauri" / "resources"
          whisper_server_dir = resources_root / "whisper-server"
          whisper_models_dir = resources_root / "whisper"
          temp_root = repo_root / ".tmp-whisper-runtime"
          shutil.rmtree(temp_root, ignore_errors=True)
          temp_root.mkdir(parents=True, exist_ok=True)
          whisper_server_dir.mkdir(parents=True, exist_ok=True)
          whisper_models_dir.mkdir(parents=True, exist_ok=True)

          # === Download Whisper Model ===
          # Download quantized model from HuggingFace
          print("[whisper-runtime] Downloading model files...")
          model_files = [
            ("ggml-base.en-q8_0.bin", "https://huggingface.co/datasets/ggerganov/whisper.cpp/resolve/main/ggml-base.en-q8_0.bin"),
            ("ggml-tiny.en-q8_0.bin", "https://huggingface.co/datasets/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en-q8_0.bin"),
          ]

          for model_name, model_url in model_files:
            model_path = whisper_models_dir / model_name
            if model_path.exists():
              print(f"[whisper-runtime] Model already exists: {model_name}")
            else:
              print(f"[whisper-runtime] Downloading {model_name}...")
              if download_file(model_url, model_path):
                print(f"[whisper-runtime] Downloaded: {model_name}")
              else:
                print(f"[whisper-runtime] Warning: Failed to download {model_name}")

          # === Download Whisper Server Binary ===
          # Fetch whisper.cpp releases
          release = request_json("https://api.github.com/repos/ggerganov/whisper.cpp/releases/latest")
          assets = release.get("assets", [])
          tag = release.get("tag_name", "unknown")

          print(f"[whisper-runtime] Fetched release {tag} with {len(assets)} assets")

          # Map OS to binary patterns
          binary_patterns = {
            "linux": ["whisper-server-linux-x86_64"],
            "windows": ["whisper-server-windows-x86_64.exe"],
            "macos": ["whisper-server-macos-arm64", "whisper-server-macos-aarch64", "whisper-server-macos-x86_64"],
          }

          found_binary = None
          for asset in assets:
            name = asset.get("name", "").lower()
            # Skip source code archives
            if "source" in name:
              continue
            for pattern in binary_patterns.get(os_key, []):
              # Look for server binary in archive name
              if pattern in name and (name.endswith(".zip") or name.endswith(".tar.gz") or name.endswith(".tar.xz")):
                found_binary = asset
                break
            if found_binary:
                break

          # Alternative: look for any server binary
          if not found_binary:
            for asset in assets:
              name = asset.get("name", "").lower()
              if "whisper-server" in name and not "source" in name and (name.endswith(".zip") or name.endswith(".tar.gz") or name.endswith(".tar.xz")):
                found_binary = asset
                break

          if not found_binary:
            print("[whisper-runtime] No pre-built server binary found in release")
            print("[whisper-runtime] Note: whisper.cpp may require building from source")
            # Create a manifest noting that binary wasn't found
            manifest = {
              "releaseTag": tag,
              "runnerOs": runner_os,
              "status": "binary_not_found",
              "note": "Pre-built whisper-server binary not found. Build from source: git clone https://github.com/ggerganov/whisper.cpp && cd whisper.cpp && make server",
            }
            (whisper_server_dir / "manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")
            print("[whisper-runtime] manifest written (binary not found)")
          else:
            name = found_binary["name"]
            url = found_binary["browser_download_url"]
            print(f"[whisper-runtime] Downloading: {name}")

            archive_path = temp_root / name
            req = urllib.request.Request(url, headers={"User-Agent": "arxell-lite-ci"})
            with urllib.request.urlopen(req, timeout=120) as resp, open(archive_path, "wb") as out:
              shutil.copyfileobj(resp, out)

            extract_dir = temp_root / "extract"
            extract_dir.mkdir(parents=True, exist_ok=True)

            # Determine extension and extract
            if name.endswith(".zip"):
              with zipfile.ZipFile(archive_path) as zf:
                zf.extractall(extract_dir)
            else:
              safe_extract_tar(archive_path, extract_dir)

            # Find the binary
            binary_map = {
              "linux": "whisper-server-linux-x86_64",
              "macos": "whisper-server-macos-aarch64",
              "windows": "whisper-server-windows-x86_64.exe",
            }
            target_binary = binary_map.get(os_key, "whisper-server")

            for path in extract_dir.rglob("whisper-server*"):
              if path.is_file():
                binary_dest = whisper_server_dir / target_binary
                shutil.copy2(path, binary_dest)
                if os_key != "windows":
                  binary_dest.chmod(binary_dest.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
                print(f"[whisper-runtime] Prepared: {binary_dest}")
                manifest = {
                  "releaseTag": tag,
                  "runnerOs": runner_os,
                  "status": "ready",
                  "binaryPath": str(binary_dest.relative_to(repo_root)),
                }
                (whisper_server_dir / "manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")
                print("[whisper-runtime] manifest written")
                break

          # List final files
          print("[whisper-runtime] Final resources:")
          for p in whisper_server_dir.iterdir():
            print(f"  {p.name}")
          for p in whisper_models_dir.iterdir():
            print(f"  {p.name}")
          PY

      - name: Prepare bundled Kokoro runtime archive
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PY=python3
          elif command -v python >/dev/null 2>&1; then
            PY=python
          else
            echo "Python executable not found on runner" >&2
            exit 1
          fi
          "$PY" scripts/prepare_kokoro_runtime.py

      - name: Verify bundled Kokoro runtime archive
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PY=python3
          elif command -v python >/dev/null 2>&1; then
            PY=python
          else
            echo "Python executable not found on runner" >&2
            exit 1
          fi
          "$PY" scripts/verify_kokoro_runtime_archive.py

      - name: Generate Kokoro runtime manifest
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PY=python3
          elif command -v python >/dev/null 2>&1; then
            PY=python
          else
            echo "Python executable not found on runner" >&2
            exit 1
          fi
          "$PY" - <<'PY'
          import hashlib
          import json
          import pathlib
          import platform

          def expected_archive_name() -> str:
            system = platform.system().lower()
            machine = platform.machine().lower()
            if machine in {"amd64", "x86_64", "x64"}:
              arch = "x86_64"
            elif machine in {"arm64", "aarch64"}:
              arch = "aarch64"
            else:
              raise RuntimeError(f"Unsupported architecture: {machine}")

            if system == "linux":
              os_tag = "linux"
            elif system == "darwin":
              os_tag = "macos"
            elif system == "windows":
              os_tag = "windows"
            else:
              raise RuntimeError(f"Unsupported platform: {system}")
            return f"kokoro-runtime-{os_tag}-{arch}.zip"

          repo_root = pathlib.Path(".").resolve()
          runtime_dir = repo_root / "src-tauri" / "resources" / "kokoro-runtime"
          archive = runtime_dir / expected_archive_name()
          if not archive.exists():
            raise RuntimeError(f"Kokoro runtime archive missing: {archive}")

          sha256 = hashlib.sha256(archive.read_bytes()).hexdigest()
          manifest = {
            "runnerOs": platform.system(),
            "runnerArch": platform.machine(),
            "archiveName": archive.name,
            "archivePath": str(archive.relative_to(repo_root)),
            "archiveSizeBytes": archive.stat().st_size,
            "sha256": sha256,
          }
          (runtime_dir / "manifest.json").write_text(
            json.dumps(manifest, indent=2) + "\n",
            encoding="utf-8",
          )
          print(f"[kokoro-runtime] manifest written for {archive.name}")
          PY

      - name: Build desktop binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --features tauri-runtime

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}-v${{ steps.app_version.outputs.version }}
          path: ${{ matrix.platform.artifact_path }}
          if-no-files-found: error

      - name: Upload bundled runtime manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}-v${{ steps.app_version.outputs.version }}-llama-runtime-manifest
          path: src-tauri/resources/llama-runtime/manifest.json
          if-no-files-found: error

      - name: Upload bundled whisper manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}-v${{ steps.app_version.outputs.version }}-whisper-runtime-manifest
          path: src-tauri/resources/whisper-server/manifest.json
          if-no-files-found: warn

      - name: Upload bundled Kokoro runtime manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}-v${{ steps.app_version.outputs.version }}-kokoro-runtime-manifest
          path: src-tauri/resources/kokoro-runtime/manifest.json
          if-no-files-found: error

      - name: Upload bundled Kokoro runtime archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}-v${{ steps.app_version.outputs.version }}-kokoro-runtime
          path: src-tauri/resources/kokoro-runtime/kokoro-runtime-*.zip
          if-no-files-found: error

      - name: Package release bundle
        id: package_release
        shell: bash
        env:
          PLATFORM_NAME: ${{ matrix.platform.name }}
          APP_VERSION: ${{ steps.app_version.outputs.version }}
          BINARY_PATH: ${{ matrix.platform.artifact_path }}
          BINARY_NAME: ${{ matrix.platform.artifact_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import os
          import pathlib
          import shutil

          platform_name = os.environ["PLATFORM_NAME"]
          app_version = os.environ["APP_VERSION"]
          binary_path = pathlib.Path(os.environ["BINARY_PATH"])
          binary_name = os.environ["BINARY_NAME"]
          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])

          if not binary_path.is_file():
              raise RuntimeError(f"binary missing: {binary_path}")

          out_root = pathlib.Path("release-assets")
          out_root.mkdir(parents=True, exist_ok=True)
          bundle_dir = out_root / f"{platform_name}-v{app_version}"
          if bundle_dir.exists():
              shutil.rmtree(bundle_dir)
          bundle_dir.mkdir(parents=True, exist_ok=True)

          shutil.copy2(binary_path, bundle_dir / binary_name)

          llama_manifest = pathlib.Path("src-tauri/resources/llama-runtime/manifest.json")
          if llama_manifest.is_file():
              shutil.copy2(llama_manifest, bundle_dir / "llama-runtime-manifest.json")

          whisper_manifest = pathlib.Path("src-tauri/resources/whisper-server/manifest.json")
          if whisper_manifest.is_file():
              shutil.copy2(whisper_manifest, bundle_dir / "whisper-runtime-manifest.json")

          kokoro_manifest = pathlib.Path("src-tauri/resources/kokoro-runtime/manifest.json")
          if kokoro_manifest.is_file():
              shutil.copy2(kokoro_manifest, bundle_dir / "kokoro-runtime-manifest.json")

          for kokoro_archive in pathlib.Path("src-tauri/resources/kokoro-runtime").glob("kokoro-runtime-*.zip"):
              shutil.copy2(kokoro_archive, bundle_dir / kokoro_archive.name)

          archive_base = out_root / f"{platform_name}-v{app_version}"
          archive_zip = pathlib.Path(
              shutil.make_archive(str(archive_base), "zip", root_dir=bundle_dir.parent, base_dir=bundle_dir.name)
          )

          digest = hashlib.sha256(archive_zip.read_bytes()).hexdigest()
          checksum_file = archive_zip.with_suffix(".zip.sha256")
          checksum_file.write_text(f"{digest}  {archive_zip.name}\n", encoding="utf-8")

          with github_output.open("a", encoding="utf-8") as f:
              f.write(f"zip={archive_zip.as_posix()}\n")
              f.write(f"sha256={checksum_file.as_posix()}\n")
          PY

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}-v${{ steps.app_version.outputs.version }}-release-assets
          path: |
            ${{ steps.package_release.outputs.zip }}
            ${{ steps.package_release.outputs.sha256 }}
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release-assets"
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
            release-assets/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
