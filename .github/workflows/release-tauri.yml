name: Release Tauri

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: "--bundles appimage"
          - platform: "macos-latest"
            args: "-- --no-default-features --features custom-protocol"
          - platform: "windows-latest"
            env:
              WHISPER_DONT_GENERATE_BINDINGS: "1"
            args: "-- --no-default-features --features custom-protocol,vulkan,whisper-rs-stt"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync app version from tag
        run: bash ./scripts/sync_version_from_tag.sh "${{ github.ref_name }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        run: npm ci

      - name: Prepare Kokoro runtime and quantized model
        run: python scripts/prepare_kokoro_runtime.py --runtime-out src-tauri/resources/kokoro-runtime --model-out public/voice/model_quantized.onnx --python-series 3.11
        env:
          GITHUB_TOKEN: ${{ github.token }}
          KOKORO_QUANT_MODEL_URL: https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/onnx/model_quantized.onnx?download=true

      - name: Verify Kokoro runtime archive present for target
        run: python scripts/verify_kokoro_runtime_archive.py

      - name: Install Linux deps for Tauri
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Install macOS deps for bindgen (libclang)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=$LLVM_PREFIX/lib" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$LLVM_PREFIX/include" >> "$GITHUB_ENV"
          echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cloud auth mode
        shell: bash
        run: |
          if [ -n "${VITE_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "Clerk key detected: building cloud-enabled release."
          else
            echo "Clerk key missing: building local-mode release (cloud auth disabled)."
          fi
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Build and bundle with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Arxell ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
