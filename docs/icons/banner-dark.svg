    <circle cx="12" cy="24" r="1.5" fill="#c4b5fd"/>
    <circle cx="68" cy="24" r="1.5" fill="#c4b5fd"/>
    <circle cx="40" cy="70" r="2" fill="#c4b5fd"/>
  </g>
  <!-- Wordmark -->
  <text x="110" y="52" font-family="'SF Pro Display', 'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#e0e7ff" letter-spacing="-1">Arxell</text>
  <!-- Tagline -->
