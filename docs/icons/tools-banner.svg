<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 60" fill="none">
  <rect x="0" y="10" width="720" height="40" rx="8" fill="#f8fafc"/>
  <!-- Tool icons as simplified shapes -->
  <g transform="translate(20, 18)" fill="#6366f1">
    <!-- Terminal -->
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#6366f1" opacity="0.1"/>
    <path d="M4,8 L10,12 L4,16" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="12" y1="16" x2="20" y2="16" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <!-- OpenCode -->
    <rect x="34" y="0" width="24" height="24" rx="4" fill="#8b5cf6" opacity="0.1"/>
    <circle cx="46" cy="12" r="6" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="46" cy="12" r="2" fill="#8b5cf6"/>
    <!-- Looper -->
    <rect x="68" y="0" width="24" height="24" rx="4" fill="#a78bfa" opacity="0.1"/>
    <path d="M78,16 A5,5 0 1,1 82,8" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M80,6 L82,8 L84,6" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Files -->
    <rect x="102" y="0" width="24" height="24" rx="4" fill="#6366f1" opacity="0.1"/>
    <path d="M108,6 L118,6 L120,8 L120,18 L108,18 Z" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <!-- Notepad -->
    <rect x="136" y="0" width="24" height="24" rx="4" fill="#8b5cf6" opacity="0.1"/>
    <line x1="142" y1="8" x2="154" y2="8" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="142" y1="12" x2="154" y2="12" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="142" y1="16" x2="150" y2="16" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Sheets -->
    <rect x="170" y="0" width="24" height="24" rx="4" fill="#a78bfa" opacity="0.1"/>
    <rect x="176" y="6" width="12" height="12" rx="1" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
    <line x1="176" y1="10" x2="188" y2="10" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
    <line x1="176" y1="14" x2="188" y2="14" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
    <line x1="180" y1="6" x2="180" y2="18" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
    <line x1="184" y1="6" x2="184" y2="18" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
    <!-- WebSearch -->
    <rect x="204" y="0" width="24" height="24" rx="4" fill="#6366f1" opacity="0.1"/>
    <circle cx="214" cy="12" r="5" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <line x1="218" y1="16" x2="222" y2="20" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <!-- Chart -->
    <rect x="238" y="0" width="24" height="24" rx="4" fill="#8b5cf6" opacity="0.1"/>
    <polyline points="244,18 248,10 252,14 256,6" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Tasks -->
    <rect x="272" y="0" width="24" height="24" rx="4" fill="#a78bfa" opacity="0.1"/>
    <path d="M278,12 L281,15 L286,9" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Memory -->
    <rect x="306" y="0" width="24" height="24" rx="4" fill="#6366f1" opacity="0.1"/>
    <circle cx="318" cy="12" r="5" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <line x1="316" y1="10" x2="320" y2="10" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="316" y1="14" x2="320" y2="14" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Docs -->
    <rect x="340" y="0" width="24" height="24" rx="4" fill="#8b5cf6" opacity="0.1"/>
    <circle cx="352" cy="12" r="5" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
    <text x="349" y="16" font-size="8" fill="#8b5cf6" font-weight="bold">?</text>
  </g>
