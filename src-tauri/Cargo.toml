[package]
name = "app-foundation"
version = "0.1.0"
edition = "2021"

[features]
default = []
tauri-runtime = ["dep:tauri"]

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tauri = { version = "2", optional = true , features = [] }
portable-pty = "0.8.1"

[build-dependencies]
tauri-build = { version = "2", features = [] }
